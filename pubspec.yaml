name: budget_app
description: A modern budgeting app with Fortuna dashboard design.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.0.5
  # Local storage
  shared_preferences: ^2.2.2
  # Navigation
  go_router: ^14.2.0
  # Date/number formatting
  intl: ^0.19.0
  # Charts
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
